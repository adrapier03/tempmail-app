services:
  tempmail-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tempmail-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
    volumes:
      - ./storage:/app/storage
